<!doctype html>
<html lang="ru" data-theme="light">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>НИИ — Coolicons 442</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">

<!--
═══════════════════════════════════════════════════════════════════════════════
  НИИ — ВИТРИНА ИКОНОК (coolicons v4.1, 442 иконки)
═══════════════════════════════════════════════════════════════════════════════

  КАК ПОЛЬЗОВАТЬСЯ (для агента):

  1.  Все иконки лежат в icons/<Категория>/<Имя>.svg
      Пример: icons/Arrow/Arrow_Circle_Down.svg

  2.  Иконки stroke="currentColor" — цвет наследуется из CSS.
      Задавай color: var(--color-fg) или var(--color-accent).

  3.  Размер по умолчанию 24×24. Масштабируй через width/height в CSS.

  4.  Клик по иконке в витрине — копирует SVG-код в буфер.

  5.  Поиск по имени — instant filter (JS). Фильтр по категории — кнопки сверху.

  6.  Категории:
        Arrow (72) · Calendar (14) · Communication (27) · Edit (72)
        Environment (13) · File (39) · Interface (73) · Media (22)
        Menu (16) · Navigation (18) · Shape (6) · System (37)
        User (13) · Warning (20)

  7.  Для Remotion: используй getStaticFiles() или importSVG(), передавай
      stroke через prop или через CSS currentColor.

═══════════════════════════════════════════════════════════════════════════════
-->
<style>
  :root {
    --color-bg:            #FFFFFF;
    --color-surface:       #FFFFFF;
    --color-surface-2:     #F4F4F4;
    --color-fg:            #0A0A0A;
    --color-fg-muted:      #555555;
    --color-fg-subtle:     #888888;
    --color-border:        #E5E5E5;
    --color-border-strong: #0A0A0A;
    --color-accent:        #E5342B;
    --color-accent-fg:     #FFFFFF;
    --shadow-xs: 2px 2px 0 0 var(--color-fg);
    --shadow-sm: 3px 3px 0 0 var(--color-fg);
    --shadow-md: 5px 5px 0 0 var(--color-fg);
    --font-sans: 'Geist', system-ui, sans-serif;
    --font-mono: 'Geist Mono', monospace;
    --radius-sm: 4px;
    --radius-md: 6px;
    --radius-lg: 8px;
    --radius-pill: 999px;
  }
  [data-theme="dark"] {
    --color-bg:            #0A0A0A;
    --color-surface:       #0A0A0A;
    --color-surface-2:     #161616;
    --color-fg:            #F4F4F4;
    --color-fg-muted:      #A8A8A8;
    --color-fg-subtle:     #6E6E6E;
    --color-border:        #2A2A2A;
    --color-border-strong: #F4F4F4;
    --color-accent:        #FF5247;
    --shadow-xs: 2px 2px 0 0 var(--color-fg);
    --shadow-sm: 3px 3px 0 0 var(--color-fg);
    --shadow-md: 5px 5px 0 0 var(--color-fg);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: var(--font-sans);
    background: var(--color-bg);
    color: var(--color-fg);
    min-height: 100vh;
  }

  /* Header */
  .hdr {
    position: sticky; top: 0; z-index: 100;
    background: var(--color-bg);
    border-bottom: 1px solid var(--color-border-strong);
    padding: 12px 24px;
    display: flex; align-items: center; gap: 16px; flex-wrap: wrap;
  }
  .hdr__brand {
    font: 600 15px/1 var(--font-mono);
    color: var(--color-fg); text-decoration: none; flex-shrink: 0;
  }
  .hdr__brand span { color: var(--color-accent); }

  /* Search */
  .search-wrap {
    position: relative; flex: 1; min-width: 200px; max-width: 380px;
  }
  .search-wrap svg {
    position: absolute; left: 10px; top: 50%; transform: translateY(-50%);
    width: 16px; height: 16px; color: var(--color-fg-subtle); pointer-events: none;
  }
  #search {
    width: 100%; padding: 8px 10px 8px 34px;
    font: 400 14px/1 var(--font-sans); color: var(--color-fg);
    background: var(--color-surface);
    border: 1px solid var(--color-border-strong);
    border-radius: var(--radius-md); outline: none;
  }
  #search:focus { box-shadow: var(--shadow-xs); transform: translate(-1px,-1px); }

  /* Count */
  #countLabel {
    font: 400 13px/1 var(--font-mono); color: var(--color-fg-subtle);
    white-space: nowrap;
  }

  /* Theme toggle */
  .theme-btn {
    margin-left: auto; padding: 6px 12px; cursor: pointer;
    background: var(--color-surface);
    border: 1px solid var(--color-border-strong);
    border-radius: var(--radius-pill);
    font: 500 12px/1 var(--font-sans); color: var(--color-fg);
  }
  .theme-btn:hover { box-shadow: var(--shadow-xs); transform: translate(-1px,-1px); }

  /* Category filters */
  .cats {
    padding: 12px 24px;
    display: flex; flex-wrap: wrap; gap: 6px;
    border-bottom: 1px solid var(--color-border);
  }
  .cat-btn {
    padding: 5px 12px; cursor: pointer;
    background: transparent;
    border: 1px solid var(--color-border-strong);
    border-radius: var(--radius-pill);
    font: 500 12px/1 var(--font-sans); color: var(--color-fg-muted);
    transition: none;
  }
  .cat-btn:hover, .cat-btn.active {
    background: var(--color-fg); color: var(--color-bg);
    border-color: var(--color-fg);
  }
  .cat-btn .n {
    display: inline-block; margin-left: 4px;
    font: 400 11px/1 var(--font-mono); color: inherit; opacity: 0.6;
  }
  .cat-btn.active .n { opacity: 0.8; }

  /* Main grid */
  .main { padding: 24px; }

  .cat-section { margin-bottom: 40px; }
  .cat-section__head {
    display: flex; align-items: baseline; gap: 10px;
    margin-bottom: 14px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--color-border);
  }
  .cat-section__title {
    font: 600 13px/1 var(--font-mono); text-transform: uppercase; letter-spacing: 0.06em;
    color: var(--color-fg);
  }
  .cat-section__count { font: 400 12px/1 var(--font-mono); color: var(--color-fg-subtle); }

  .icon-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
    gap: 8px;
  }

  /* Icon tile */
  .icon-tile {
    display: flex; flex-direction: column; align-items: center; gap: 6px;
    padding: 14px 8px 10px;
    background: var(--color-surface);
    border: 1px solid var(--color-border-strong);
    border-radius: var(--radius-md);
    cursor: pointer;
    position: relative;
    overflow: hidden;
    transition: transform 0.08s, box-shadow 0.08s;
    user-select: none;
  }
  .icon-tile:hover {
    transform: translate(-2px,-2px);
    box-shadow: var(--shadow-sm);
    z-index: 1;
  }
  .icon-tile:active { transform: translate(0,0); box-shadow: none; }
  .icon-tile svg { width: 20px; height: 20px; flex-shrink: 0; }
  .icon-tile__name {
    font: 400 9px/1.2 var(--font-mono); color: var(--color-fg-subtle);
    text-align: center; word-break: break-all; line-clamp: 2;
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .icon-tile:hover .icon-tile__name { color: var(--color-fg); }
  .icon-tile.copied { border-color: var(--color-accent); box-shadow: var(--shadow-xs); }
  .icon-tile.copied svg { color: var(--color-accent); }

  /* Empty */
  .empty-state {
    text-align: center; padding: 80px 24px;
    color: var(--color-fg-subtle);
    font: 400 14px/1.6 var(--font-sans);
  }
  .empty-state strong { display: block; font-size: 18px; margin-bottom: 8px; color: var(--color-fg-muted); }

  /* Toast */
  .toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(60px);
    background: var(--color-fg); color: var(--color-bg);
    padding: 8px 18px; border-radius: var(--radius-pill);
    font: 500 13px/1 var(--font-mono);
    box-shadow: var(--shadow-md);
    opacity: 0; transition: opacity 0.15s, transform 0.15s;
    pointer-events: none; z-index: 999;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<header class="hdr">
  <a class="hdr__brand" href="design-system.html">НИИ<span>.</span></a>
  <div class="search-wrap">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.5-3.5"/></svg>
    <input id="search" type="search" placeholder="Найти иконку…" autocomplete="off" spellcheck="false">
  </div>
  <span id="countLabel">442 иконки</span>
  <button class="theme-btn" id="themeBtn">Тема: light</button>
</header>

<nav class="cats" id="cats" aria-label="Категории"></nav>

<main class="main" id="main"></main>

<div class="toast" id="toast" role="status">Скопировано</div>

<script>
// ─── Данные ─────────────────────────────────────────────────────────────────
const ICONS = {
  "Arrow":["Arrow_Circle_Down","Arrow_Circle_Down_Left","Arrow_Circle_Down_Right","Arrow_Circle_Left","Arrow_Circle_Right","Arrow_Circle_Up","Arrow_Circle_Up_Left","Arrow_Circle_Up_Right","Arrow_Down","Arrow_Down_LG","Arrow_Down_Left","Arrow_Down_Left_LG","Arrow_Down_MD","Arrow_Down_Right","Arrow_Down_Right_LG","Arrow_Down_SM","Arrow_Left","Arrow_Left_LG","Arrow_Left_MD","Arrow_Left_SM","Arrow_Right","Arrow_Right_LG","Arrow_Right_MD","Arrow_Right_SM","Arrow_Sub_Down_Left","Arrow_Sub_Down_Right","Arrow_Sub_Left_Down","Arrow_Sub_Left_Up","Arrow_Sub_Right_Down","Arrow_Sub_Right_Up","Arrow_Sub_Up_Left","Arrow_Sub_Up_Right","Arrow_Up","Arrow_Up_LG","Arrow_Up_Left","Arrow_Up_Left_LG","Arrow_Up_MD","Arrow_Up_Right","Arrow_Up_Right_LG","Arrow_Up_SM","Caret_Down_MD","Caret_Down_SM","Caret_Left_MD","Caret_Left_SM","Caret_Right_MD","Caret_Right_SM","Caret_Up_MD","Caret_Up_SM","Collapse","Corner_Down_Left","Corner_Down_Right","Corner_Left_Down","Corner_Left_Up","Corner_Right_Down","Corner_Right_Up","Corner_Up_Left","Corner_Up_Right","Direction","Expand","Move","Move_2","Redo","Redo_2","Refresh","Refresh_2","Return","Rotate_Left","Rotate_Right","Shuffle","Undo","Undo_2","Vertical_Switch","Vertical_Switch_2"],
  "Calendar":["Calendar","Calendar_Check","Calendar_Days","Calendar_Days_2","Calendar_Event","Calendar_Event_2","Calendar_Plus","Calendar_Range","Calendar_Range_2","Calendar_Search","Calendar_Settings","Calendar_X","Clock","Time_Fast"],
  "Communication":["Attachment","Attachment_Horizontal","Chat","Chat_Alt","Chat_Alt_2","Chat_Plus","Chat_Search","Email","Email_Open","Email_Plus","Email_Search","Email_Send","Inbox","Inbox_Full","Inbox_In","Inbox_Out","Link","Link_2","Link_Broken","Message","Reply","Reply_All","Send","Share","Share_2","Share_3","Video_Call"],
  "Edit":["Brackets","Brackets_Ellipsis","Cc","Check","Check_All","Check_Circle","Check_Ring","Check_Ring_2","Check_Ring_3","Check_Square","Check_Square_2","Checkbox","Click","Close_Circle","Close_MD","Close_Round","Close_SM","Close_Square","Cursor","Cursor_Text","Cut","Desktop_Cursor","Divide","Edit","Edit_2","Edit_3","Eraser","Eraser_2","Filter","Filter_Off","Highlights","Input_Field","Layers","Layers_2","Layers_3","Link_Plus","Minus","Minus_Circle","Minus_MD","Minus_Round","Minus_SM","Minus_Square","Paragraph","Pencil","Pencil_2","Pencil_3","Pencil_4","Plus","Plus_Circle","Plus_MD","Plus_Round","Plus_SM","Plus_Square","Quotation","Remove_Formatting","Scale","Scale_2","Scale_3","Selection","Strikethrough","Tag","Tag_2","Text","Text_Block","Type","Underline","Wrench"],
  "Environment":["Bug","Cloud","Cloud_Down","Cloud_Up","Download","Download_2","Download_3","Nature","Nature_2","Nature_3","Rain","Settings_2","Upload","Upload_2","Upload_3"],
  "File":["Chart","Chart_Pie","Chart_Pie_2","Document","Document_Add","Document_Check","Document_Favorite","Document_Lines","Document_List","Document_Menu","Document_Minus","Document_Multi","Document_Remove","Document_Search","Document_Settings","Document_Stack","Document_Text","Folder","Folder_Add","Folder_Check","Folder_Cross","Folder_Favorite","Folder_Minus","Folder_Move","Folder_Move_2","Folder_Open","Folder_Search","Folder_Settings","Folder_Stack","Folder_Stack_2","Folder_Upload","Folder_Upload_2","Grid","Grid_2","List","List_2","List_Check","List_Check_2","Sidebar"],
  "Interface":["Accessible","Airplane","Alarm","Analytics","Archive","At","Award","Badge","Barcode","Bell","Bell_Off","Bluetooth","Bolt","Bookmark","Bookmark_2","Bookmark_3","Box","Box_2","Building","Calculator","Calendar_3","Certificate","Clipboard","Clipboard_Check","Clipboard_Text","Coffee","Command","Command_2","Company","Compass","Component","Cpu","Crown","Dashboard","Database","Database_2","Diamond","Discord","Drag","Fingerprint","Fire","Flag","Flask","Focus","Frame","Gamepad","Gem","Gift","Globe","Globe_2","Grid_3","Grid_4","Hash","Heart","Heart_2","Help","Home","Id_Card","Image","Info","Joystick","Key","Label","Life_ring","Lock","Lock_Open","Love","Map","Map_Pin","Medal","Megaphone","Microchip","Notification","Palette","Password","Pin","Print","Pulse","Puzzle_Piece","QR_Code","Radioactive","RSS","Safe_Box","Search","Signpost","Slider_01","Slider_02","Slider_03","Slider_04","Slider_05","Slider_06","Sliders","Sliders_2","Sort_AZ","Sort_ZA","Speaker","Speed","Star","Star_2","Stats","Store","Sun","Terminal","Thumbs_Down","Thumbs_Up","Toggle_Off","Toggle_On","Tool_2","User_Switch","Verified","Wallet","Warranty","Wifi","Wifi_Off","X"],
  "Media":["Album","Airplay","Camera","Camera_2","Cast","Clapperboard","Control","Fast_Forward","Film","Full_Screen","Full_Screen_2","Image_2","Mic","Mic_Off","Music","Pause","Play","Record","Rewind","Screen","Slow_Motion","Volume","Volume_Mute","Volume_Off"],
  "Menu":["Category","Cell","Columns","Layout","Layout_2","Layout_3","Layout_4","Layout_5","Layout_6","Layout_7","Menu_Alt_01","Menu_Alt_02","Menu_Alt_03","Menu_Alt_04","Menu_MD","More_Grid_Big"],
  "Navigation":["Browser","Browser_2","Compass_2","Crosshair","Cursor_2","Drag_2","Expand_2","GPS","Location","Map_2","Map_Pin_2","Map_Pin_3","Map_Route","Maximize","Minimize","More_Horizontal","More_Vertical","Zoom"],
  "Shape":["Circle","Hexagon","Pentagon","Rectangle","Square","Triangle"],
  "System":["Code","Code_2","Data","Delete","Delete_2","Desktop","Device","Device_2","Device_3","Drone","Hard_Drive","Headphone","Headphone_2","Image_3","Keyboard","Laptop","Mobile","Mobile_2","Mobile_3","Monitor","Mouse","Mouse_2","Network","Package","Power","Printer","Scanner","Server","Settings","Settings_3","Sim_Card","Smartphone","Speakerphone","Tablet","Tablet_2","USB","Watch"],
  "User":["Group","Group_2","Group_3","No_User","No_User_2","User","User_2","User_3","User_4","User_5","User_Box","User_Circle","User_Voice"],
  "Warning":["Alert_Circle","Alert_Triangle","Ban","Block","Error_Circle","Error_Square","Error_Warning","Eye","Eye_Off","Eye_Slash","Lock_2","Minus_Ring","No","No_2","No_Smoking","Notification_Off","Notification_On","Privacy_Policy","Shield","Shield_2"]
};

const CATS = Object.keys(ICONS);
let activeCat = 'all';
let searchQ = '';
let svgCache = {};

// ─── Toast ──────────────────────────────────────────────────────────────────
let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 1800);
}

// ─── Fetch & cache SVG content ───────────────────────────────────────────────
async function getSVG(cat, name) {
  const key = `${cat}/${name}`;
  if (svgCache[key]) return svgCache[key];
  try {
    const r = await fetch(`icons/${cat}/${name}.svg`);
    const text = await r.text();
    svgCache[key] = text;
    return text;
  } catch { return null; }
}

// ─── Copy SVG to clipboard ──────────────────────────────────────────────────
async function copyIcon(cat, name, tile) {
  const svgText = await getSVG(cat, name);
  if (!svgText) return;
  await navigator.clipboard.writeText(svgText);
  tile.classList.add('copied');
  setTimeout(() => tile.classList.remove('copied'), 900);
  showToast(`${name} скопирован`);
}

// ─── Render SVG inline ──────────────────────────────────────────────────────
async function renderTileSVG(tile, cat, name) {
  const svgText = await getSVG(cat, name);
  if (!svgText) return;
  // Strip XML declaration, inject currentColor
  const clean = svgText
    .replace(/<\?xml[^>]*\?>/g, '')
    .replace(/width="\d+"/, 'width="20"')
    .replace(/height="\d+"/, 'height="20"')
    .replace(/stroke="#[0-9a-fA-F]+"/, 'stroke="currentColor"');
  const placeholder = tile.querySelector('.icon-placeholder');
  if (placeholder) placeholder.outerHTML = clean;
}

// ─── Build icon grid ─────────────────────────────────────────────────────────
function render() {
  const main = document.getElementById('main');
  const q = searchQ.toLowerCase().replace(/_/g, ' ');
  let total = 0;

  const catsToShow = activeCat === 'all' ? CATS : [activeCat];
  const sections = [];

  for (const cat of catsToShow) {
    const icons = ICONS[cat].filter(name => {
      const n = name.toLowerCase().replace(/_/g, ' ');
      return !q || n.includes(q);
    });
    if (icons.length) {
      sections.push({ cat, icons });
      total += icons.length;
    }
  }

  document.getElementById('countLabel').textContent =
    total === 442 ? '442 иконки' : `${total} из 442`;

  if (!sections.length) {
    main.innerHTML = `<div class="empty-state"><strong>Ничего не найдено</strong>Попробуй другой запрос — иконок 442 штуки, найдётся что-то похожее.</div>`;
    return;
  }

  main.innerHTML = sections.map(({ cat, icons }) => `
    <section class="cat-section" data-cat="${cat}">
      <div class="cat-section__head">
        <span class="cat-section__title">${cat}</span>
        <span class="cat-section__count">${icons.length}</span>
      </div>
      <div class="icon-grid">
        ${icons.map(name => `
          <button class="icon-tile" data-cat="${cat}" data-name="${name}" title="${name.replace(/_/g,' ')} — клик чтобы скопировать SVG">
            <span class="icon-placeholder" style="width:20px;height:20px;display:block;background:var(--color-surface-2);border-radius:4px;"></span>
            <span class="icon-tile__name">${name.replace(/_/g,' ')}</span>
          </button>`).join('')}
      </div>
    </section>
  `).join('');

  // Lazy-load SVGs via IntersectionObserver
  const observer = new IntersectionObserver((entries) => {
    for (const entry of entries) {
      if (!entry.isIntersecting) continue;
      const tile = entry.target;
      const { cat, name } = tile.dataset;
      renderTileSVG(tile, cat, name);
      observer.unobserve(tile);
    }
  }, { rootMargin: '200px' });

  main.querySelectorAll('.icon-tile').forEach(t => observer.observe(t));

  // Click handler
  main.querySelectorAll('.icon-tile').forEach(tile => {
    tile.addEventListener('click', () => copyIcon(tile.dataset.cat, tile.dataset.name, tile));
  });
}

// ─── Category buttons ────────────────────────────────────────────────────────
function buildCats() {
  const nav = document.getElementById('cats');
  const allCount = CATS.reduce((s, c) => s + ICONS[c].length, 0);

  const all = document.createElement('button');
  all.className = 'cat-btn active'; all.dataset.cat = 'all';
  all.innerHTML = `Все <span class="n">${allCount}</span>`;
  nav.appendChild(all);

  CATS.forEach(cat => {
    const btn = document.createElement('button');
    btn.className = 'cat-btn'; btn.dataset.cat = cat;
    btn.innerHTML = `${cat} <span class="n">${ICONS[cat].length}</span>`;
    nav.appendChild(btn);
  });

  nav.addEventListener('click', e => {
    const btn = e.target.closest('.cat-btn');
    if (!btn) return;
    activeCat = btn.dataset.cat;
    nav.querySelectorAll('.cat-btn').forEach(b => b.classList.toggle('active', b === btn));
    render();
  });
}

// ─── Search ──────────────────────────────────────────────────────────────────
let searchDebounce;
document.getElementById('search').addEventListener('input', e => {
  clearTimeout(searchDebounce);
  searchDebounce = setTimeout(() => {
    searchQ = e.target.value;
    render();
  }, 120);
});

// ─── Theme ───────────────────────────────────────────────────────────────────
const themeBtn = document.getElementById('themeBtn');
themeBtn.addEventListener('click', () => {
  const dark = document.documentElement.dataset.theme === 'dark';
  document.documentElement.dataset.theme = dark ? 'light' : 'dark';
  themeBtn.textContent = dark ? 'Тема: light' : 'Тема: dark';
});
document.addEventListener('keydown', e => {
  if (e.key === 'T' && !e.target.matches('input,textarea')) themeBtn.click();
});

// ─── Init ─────────────────────────────────────────────────────────────────────
buildCats();
render();
</script>
</body>
</html>
